name: CI / Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Lint, type-check, and test
  # ────────────────────────────────────────────────────────────────────────────
  ci:
    name: CI (lint, type-check, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate required environment variables
        run: |
          echo "Checking that required env var names are documented in .env.example..."
          required_vars="NEXTAUTH_URL NEXTAUTH_SECRET GITHUB_ID GITHUB_SECRET DATABASE_URL"
          missing=0
          for var in $required_vars; do
            if ! grep -q "^${var}=" .env.example; then
              echo "❌ Missing variable in .env.example: ${var}"
              missing=1
            else
              echo "✅ ${var}"
            fi
          done
          if [ "$missing" -eq "1" ]; then
            echo "Update .env.example to document all required variables."
            exit 1
          fi

      - name: Run linter
        run: npm run lint

      - name: Run type-check
        run: npm run type-check
        continue-on-error: true  # Remove once tsconfig is configured

      - name: Run tests
        run: npm test --if-present
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test?schema=public"
          NEXTAUTH_SECRET: "ci-test-secret-not-real"
          NEXTAUTH_URL: "http://localhost:3000"

      - name: Build application
        run: npm run build
        env:
          # Provide stub values so the build doesn't fail on missing env vars.
          # Real values are set in Vercel for actual deployments.
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "ci-build-secret-not-real"
          DATABASE_URL: "postgresql://user:password@localhost:5432/a1_db?schema=public"
          NEXT_TELEMETRY_DISABLED: "1"

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy to Vercel (only on push to main)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      contents: read

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed to $url"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Run database migrations
        run: |
          if [ -d "prisma/migrations" ]; then
            npx prisma migrate deploy
          else
            echo "No migrations directory found — skipping migration step."
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
