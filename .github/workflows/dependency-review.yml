name: "Dependency Review"

on:
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the check if any dependency has a known vulnerability
          fail-on-severity: low
          # Post a comment on the PR summarising any findings
          comment-summary-in-pr: always
          # Block copyleft-licensed dependencies that could restrict distribution
          deny-licenses: "GPL-2.0, AGPL-3.0"
