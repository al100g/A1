name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run linter (if present)
        run: |
          if python -m flake8 --version &>/dev/null 2>&1; then
            python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          else
            echo "flake8 not installed — skipping."
          fi

      - name: Run tests (if present)
        run: |
          if [ -d tests ] && python -m pytest --version &>/dev/null 2>&1; then
            python -m pytest tests/ -v
          else
            echo "No tests directory or pytest not installed — skipping."
          fi
